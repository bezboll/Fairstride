<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FairStride – Netzplan v5</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#080808;
    --red:#e03030;--rg:rgba(224,48,48,.6);--rd:rgba(224,48,48,.08);
    --grn:#22c55e;--gg:rgba(34,197,94,.6);--gd:rgba(34,197,94,.07);
    --txt:#e0e0e0;--mid:#555;
  }
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'IBM Plex Sans',sans-serif}
  body{display:flex;flex-direction:column}

  #ov{position:fixed;inset:0;background:rgba(8,8,8,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;cursor:pointer;backdrop-filter:blur(4px);transition:opacity .4s}
  #ov .sub{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;color:#444;text-transform:uppercase}
  #ov .logo{font-family:'IBM Plex Mono',monospace;font-size:34px;font-weight:600;color:#fff;letter-spacing:.06em}
  #ov .logo span{color:var(--red)}
  #ov .btn{margin-top:10px;border:1px solid #2a2a2a;border-radius:3px;padding:10px 30px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;color:#444;text-transform:uppercase;transition:all .2s}
  #ov:hover .btn{border-color:var(--red);color:#fff;box-shadow:0 0 14px var(--rg)}
  #ov.gone{opacity:0;pointer-events:none}

  header{flex-shrink:0;margin:20px 40px 0;padding:0 0 0 16px;border-left:3px solid var(--red)}
  header h1{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;letter-spacing:.05em;color:#fff}
  header p{font-size:11px;color:var(--mid);margin-top:4px;font-family:'IBM Plex Mono',monospace}

  .leg{display:flex;gap:22px;padding:8px 40px;flex-shrink:0;align-items:center;flex-wrap:wrap}
  .li{display:flex;align-items:center;gap:7px;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--mid);letter-spacing:.04em}

  #wrap{flex:1;overflow:auto;padding:8px 40px 16px}
  #wrap::-webkit-scrollbar{height:4px;width:4px}
  #wrap::-webkit-scrollbar-thumb{background:#1e1e1e;border-radius:2px}

  .ng{cursor:pointer}
  .ng:hover .bx-r{filter:drop-shadow(0 0 8px rgba(224,48,48,.85)) drop-shadow(0 0 16px rgba(224,48,48,.45))}
  .ng:hover .bx-g{filter:drop-shadow(0 0 8px rgba(34,197,94,.85)) drop-shadow(0 0 16px rgba(34,197,94,.45))}
  .ng:hover .dm-r{filter:drop-shadow(0 0 10px rgba(224,48,48,.9)) drop-shadow(0 0 20px rgba(224,48,48,.5))}
  .ng:hover .dm-g{filter:drop-shadow(0 0 10px rgba(34,197,94,.9)) drop-shadow(0 0 20px rgba(34,197,94,.5))}

  .edge{fill:none;stroke-width:1.6}
  .e-r{stroke:#e03030;opacity:.7}
  .e-g{stroke:#22c55e;opacity:.55}

  #tip{position:fixed;background:#111;border:1px solid #222;border-radius:6px;padding:18px 22px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--txt);pointer-events:none;opacity:0;transition:opacity .15s;z-index:1000;line-height:1.8;white-space:nowrap;box-shadow:0 8px 40px rgba(0,0,0,.85);min-width:300px}
  .tt{font-size:15px;font-weight:600;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #1e1e1e}
  .trow{display:flex;gap:10px}
  .tk{color:#3a3a3a;min-width:100px}
  .tv{color:#ccc}
  .tsep{height:1px;background:#1a1a1a;margin:7px 0}
  .tcost{font-size:16px;font-weight:600;margin-top:4px}

  @keyframes fU{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
  .ng{animation:fU .4s ease both}
</style>
</head>
<body>

<div id="ov">
  <div class="sub">FairStride · Netzplan v5</div>
  <div class="logo">FAIR<span>STRIDE</span></div>
  <div class="btn">Klicken zum Starten</div>
</div>
<div id="tip"></div>

<header>
  <h1>NETZPLAN – PROJEKTPLAN</h1>
  <p>02.03.2026 → 28.08.2026 &nbsp;//&nbsp; 129 ARBEITSTAGE &nbsp;//&nbsp; € 95.520 GESAMT</p>
</header>

<div class="leg">
  <div class="li"><div style="width:20px;height:10px;border-radius:2px;background:#e03030"></div>Kritischer Pfad</div>
  <div class="li"><div style="width:20px;height:10px;border-radius:2px;background:#22c55e"></div>Parallel / Nicht-kritisch</div>
  <div class="li"><div style="width:14px;height:14px;transform:rotate(45deg);border:2px solid #e03030;background:rgba(224,48,48,.12)"></div>Meilenstein</div>
  <div class="li">
    <div style="display:flex;gap:3px;align-items:center">
      <div style="width:12px;height:12px;background:rgba(255,80,80,.3);border:1.5px solid rgba(255,100,100,.7);border-radius:2px"></div>
      <div style="width:12px;height:12px;background:rgba(60,160,255,.25);border:1.5px solid rgba(80,170,255,.65);border-radius:2px"></div>
      <div style="width:12px;height:12px;background:rgba(60,220,130,.2);border:1.5px solid rgba(80,220,140,.6);border-radius:2px"></div>
    </div>
    Phasenbänder (überlappend)
  </div>
</div>

<div id="wrap">
  <svg id="net" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3600 640" style="width:3600px;height:640px;display:block"></svg>
</div>

<script>
document.getElementById('ov').addEventListener('click',()=>{
  const e=document.documentElement;
  (e.requestFullscreen||e.webkitRequestFullscreen||e.mozRequestFullScreen||e.msRequestFullscreen||function(){}).call(e);
  const ov=document.getElementById('ov');
  ov.classList.add('gone');
  setTimeout(()=>ov.style.display='none',450);
});

const NW=142,NH=56,DHW=52,DHH=28;
const NS='http://www.w3.org/2000/svg';
const RA=145,RB=270,RC=400,RD=530;

const nodes=[
  // ROW B — critical spine
  {id:3,  cx:80,   cy:RB,type:'ms',  crit:'r',label:['Ausarbeitung','gestartet'],         date:'02.03.26',dur:'0 Tage'},
  {id:4,  cx:250,  cy:RB,type:'task',crit:'r',label:['Projektziel','definieren'],          date:'03–09.03',dur:'5 Tage', res:'Boller, Krenn',              work:'80 h',  cost:'€ 2.400'},
  {id:5,  cx:425,  cy:RB,type:'task',crit:'r',label:['Ressourcen-','planung'],             date:'10–16.03',dur:'5 Tage', res:'Boller, Krenn',              work:'80 h',  cost:'€ 2.400'},
  {id:7,  cx:595,  cy:RB,type:'ms',  crit:'r',label:['Konzept','beendet'],                 date:'16.03.26',dur:'0 Tage'},
  {id:9,  cx:762,  cy:RB,type:'task',crit:'r',label:['Market','Research'],                 date:'17–26.03',dur:'8 Tage', res:'Bauer, Boller, Krenn',       work:'192 h', cost:'€ 5.120'},
  {id:11, cx:952,  cy:RB,type:'task',crit:'r',label:['Konzept-','entwicklung'],            date:'27.03–09.04',dur:'10 Tage',res:'Bauer, Boller, Krenn',    work:'240 h', cost:'€ 6.400'},
  {id:13, cx:1145, cy:RB,type:'task',crit:'g',label:['Simulation','FEM'],                  date:'01–14.05',dur:'10 Tage',res:'Bauer, Boller',              work:'160 h', cost:'€ 4.000',note:'Nicht-kritisch / parallel'},
  {id:14, cx:1315, cy:RB,type:'ms',  crit:'r',label:['Konstruktion','beendet'],            date:'14.05.26',dur:'0 Tage'},
  // ROW D — parallel (kritisch: Team/CAD/Techn.; nicht-kritisch: others)
  {id:6,  cx:425,  cy:RD,type:'task',crit:'r',label:['Team','bauen'],                      date:'12–16.03',dur:'3 Tage', res:'Boller, Krenn',              work:'48 h',  cost:'€ 1.440',note:'Parallel mit Ressourcenplanung'},
  {id:10, cx:762,  cy:RD,type:'task',crit:'r',label:['Techn. Anf.','definieren'],          date:'23–25.03',dur:'3 Tage', res:'Krenn',                      work:'24 h',  cost:'€ 720',  note:'Parallel mit Market Research'},
  {id:12, cx:1145, cy:RD,type:'task',crit:'r',label:['CAD Modelle','erstellen'],           date:'10.04–07.05',dur:'20 Tage',res:'Bauer, Boller',           work:'320 h', cost:'€ 8.000',note:'Parallel mit FEM Simulation'},
  {id:30, cx:1878, cy:RD,type:'task',crit:'g',label:['Sicherheit &','Normprüfung'],        date:'10–16.06',dur:'5 Tage', res:'Recht',                      work:'40 h',  cost:'€ 1.400',note:'Parallel mit Mechanische Tests'},
  // ROW C — Phase 3 + 4 critical chain
  {id:16, cx:1012, cy:RC,type:'task',crit:'r',label:['Werkstoff-','auswahl'],              date:'11–12.05',dur:'2 Tage', res:'Bauer, Boller, Test, Krenn', work:'64 h',  cost:'€ 1.760'},
  {id:17, cx:1190, cy:RC,type:'task',crit:'r',label:['Lieferanten-','recherche'],          date:'13–14.05',dur:'2 Tage', res:'Krenn',                      work:'16 h',  cost:'€ 480'},
  {id:18, cx:1368, cy:RC,type:'task',crit:'r',label:['Material-','beschaffung'],           date:'15–18.05',dur:'2 Tage', res:'Krenn',                      work:'16 h',  cost:'€ 480'},
  {id:19, cx:1538, cy:RC,type:'ms',  crit:'r',label:['Material','geliefert'],              date:'18.05.26',dur:'0 Tage'},
  {id:21, cx:1698, cy:RC,type:'task',crit:'r',label:['Fertigungs-','prozess festl.'],      date:'19.05',   dur:'1 Tag',  res:'Bauer, Boller, Test',         work:'24 h',  cost:'€ 640'},
  {id:22, cx:1878, cy:RC,type:'task',crit:'r',label:['Prototyp','herstellen'],             date:'20–26.05',dur:'5 Tage', res:'Bauer, Boller, Faserv.',     work:'120 h', cost:'€ 13.000'},
  {id:23, cx:2060, cy:RC,type:'task',crit:'r',label:['Prototyp','optimieren'],             date:'27.05–09.06',dur:'10 Tage',res:'Boller, Test',            work:'160 h', cost:'€ 4.800'},
  {id:24, cx:2240, cy:RC,type:'ms',  crit:'r',label:['Prototyp','gebaut'],                 date:'09.06.26',dur:'0 Tage'},
  // ROW D — green parallel FROM Prototyp gebaut (24)
  {id:28, cx:2390, cy:RD,type:'task',crit:'g',label:['Praxistests','Probanden'],           date:'10–16.06',dur:'5 Tage', res:'Krenn',                      work:'40 h',  cost:'€ 1.200',note:'Parallel nach Prototyp gebaut'},
  {id:29, cx:2570, cy:RD,type:'task',crit:'g',label:['Leistungsanal.','& Ergonomie'],      date:'17–23.06',dur:'5 Tage', res:'Bauer, Krenn',               work:'80 h',  cost:'€ 2.000'},
  // ROW A — Überprüfung + Mechanische Tests → Phase 6 chain
  {id:26, cx:1698, cy:RA,type:'ms',  crit:'r',label:['Überprüfung','startet'],             date:'09.06.26',dur:'0 Tage'},
  {id:27, cx:1878, cy:RA,type:'task',crit:'r',label:['Mechanische','Tests'],               date:'10.06–07.07',dur:'20 Tage',res:'Test',                   work:'160 h', cost:'€ 4.800',note:'Längster Testpfad → kritisch'},
  {id:31, cx:2240, cy:RA,type:'ms',  crit:'r',label:['Tests','durchgeführt'],              date:'07.07.26',dur:'0 Tage'},
  {id:33, cx:2738, cy:RA,type:'task',crit:'r',label:['Serienfer-','tigung planen'],        date:'08–10.07',dur:'3 Tage', res:'Bauer, Boller, Krenn',       work:'72 h',  cost:'€ 1.920'},
  {id:34, cx:2916, cy:RA,type:'task',crit:'r',label:['Maschinen','einrichten'],            date:'13–24.07',dur:'10 Tage',res:'Bauer, Krenn, Werkzeuge',    work:'160 h', cost:'€ 14.000'},
  {id:35, cx:3094, cy:RA,type:'task',crit:'r',label:['Pilot-','serie'],                    date:'27–31.07',dur:'5 Tage', res:'Bauer, Boller',              work:'80 h',  cost:'€ 2.000'},
  {id:36, cx:3272, cy:RA,type:'task',crit:'r',label:['Herstellung','optimieren'],          date:'03–28.08',dur:'20 Tage',res:'Bauer, Krenn',               work:'320 h', cost:'€ 8.000'},
  {id:37, cx:3460, cy:RA,type:'ms',  crit:'r',label:['Herstellung','startet'],             date:'28.08.26',dur:'0 Tage'},
];

const edges=[
  {f:3,t:4,c:'r'},{f:4,t:5,c:'r'},{f:4,t:6,c:'g'},{f:5,t:7,c:'r'},
  {f:7,t:9,c:'r'},{f:7,t:10,c:'r'},{f:9,t:11,c:'r'},
  {f:11,t:12,c:'r'},{f:11,t:13,c:'g'},{f:11,t:16,c:'r'},{f:13,t:14,c:'g'},
  {f:16,t:17,c:'r'},{f:17,t:18,c:'r'},{f:18,t:19,c:'r'},
  {f:19,t:21,c:'r'},{f:21,t:22,c:'r'},{f:21,t:26,c:'r'},{f:21,t:30,c:'g'},
  {f:22,t:23,c:'r'},{f:23,t:24,c:'r'},
  // Prototyp gebaut → Praxistests → Leistungsanalyse (green, going down)
  {f:24,t:28,c:'g'},{f:28,t:29,c:'g'},
  {f:26,t:27,c:'r'},{f:27,t:31,c:'r'},
  {f:31,t:33,c:'r'},{f:33,t:34,c:'r'},{f:34,t:35,c:'r'},{f:35,t:36,c:'r'},{f:36,t:37,c:'r'},
];

// Phase bands — x/y/w/h/fill/stroke/label/labelX
// Each phase spans from first node to last node in that phase
// Phase 1: Ausarbeitung (cx80-52=28) → Konzept beendet (cx595+52=647)  rows RA..RD (y60..590)
// Phase 2: Konzept beendet (543) → Konstruktion beendet (1315+52=1367)  all rows
// Phase 3: after Konzeptentwicklung (cx952+71=1023) → Material geliefert (1538+52=1590)  rows RC..RD
// Phase 4: Material geliefert (1538-52=1486) → Prototyp gebaut (2240+52=2292)  rows RC..RD + RA
// Phase 5: Überprüfung startet (1698-52=1646) → Tests durchgeführt (2240+52=2292)  rows RA..RD
// Phase 6: Tests durchgeführt (2240-52=2188) → Herstellung startet (3140+52=3192)  row RA
const bands=[
  {x:28,   y:60, w:621, h:560, fill:'rgba(255,70,70,.14)',   stroke:'rgba(255,100,100,.55)', lbl:'PHASE 1 · KONZEPT',       lx:338},
  {x:540,  y:60, w:835, h:560, fill:'rgba(60,140,255,.11)',  stroke:'rgba(80,160,255,.50)',  lbl:'PHASE 2 · KONSTRUKTION',  lx:958},
  {x:955,  y:318,w:643, h:282, fill:'rgba(60,210,130,.12)',  stroke:'rgba(80,220,140,.52)',  lbl:'PHASE 3 · MATERIAL',      lx:1277},
  {x:1480, y:60, w:820, h:560, fill:'rgba(190,80,255,.1)',   stroke:'rgba(200,110,255,.48)', lbl:'PHASE 4 · PROTOTYP',      lx:1890},
  {x:1640, y:60, w:1050,h:560, fill:'rgba(255,150,40,.1)',   stroke:'rgba(255,170,60,.50)',  lbl:'PHASE 5 · TESTEN',        lx:1970},
  {x:2182, y:60, w:1390,h:175, fill:'rgba(240,210,50,.1)',   stroke:'rgba(245,220,70,.52)',  lbl:'PHASE 6 · HERSTELLUNG',   lx:2692},
];

const svg=document.getElementById('net');
const tip=document.getElementById('tip');
const byId=id=>nodes.find(n=>n.id===id);

function mk(tag,attrs={}){
  const e=document.createElementNS(NS,tag);
  for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);
  return e;
}

function port(n,dir){
  const hw=n.type==='ms'?DHW:NW/2, hh=n.type==='ms'?DHH:NH/2;
  if(dir==='r')return[n.cx+hw,n.cy];
  if(dir==='l')return[n.cx-hw,n.cy];
  if(dir==='t')return[n.cx,n.cy-hh];
  if(dir==='b')return[n.cx,n.cy+hh];
}

function buildPath(e){
  const fn=byId(e.f),tn=byId(e.t);
  if(!fn||!tn)return'';
  const dy=tn.cy-fn.cy,dx=tn.cx-fn.cx;
  if(Math.abs(dy)<15){
    const[sx,sy]=port(fn,'r'),[tx,ty]=port(tn,'l'),mx=(sx+tx)/2;
    return`M${sx},${sy} C${mx},${sy} ${mx},${ty} ${tx},${ty}`;
  }
  if(dy<0){
    if(Math.abs(dx)<15){const[sx,sy]=port(fn,'t'),[tx,ty]=port(tn,'b');return`M${sx},${sy} L${tx},${ty}`;}
    const[sx,sy]=port(fn,'t'),[tx,ty]=port(tn,'l'),mY=(sy+ty)/2;
    return`M${sx},${sy} C${sx},${mY} ${tx},${mY} ${tx},${ty}`;
  }
  const[sx,sy]=port(fn,'b'),[tx,ty]=port(tn,'l'),mY=sy+(ty-sy)*.5;
  return`M${sx},${sy} C${sx},${mY} ${tx},${mY} ${tx},${ty}`;
}

// Markers
const defs=mk('defs');
[['ar-r','#e03030'],['ar-g','#22c55e']].forEach(([id,col])=>{
  const m=mk('marker',{id,'markerWidth':'7','markerHeight':'7','refX':'6','refY':'3','orient':'auto'});
  m.appendChild(mk('path',{d:'M0,0 L7,3 L0,6 L1.5,3 Z',fill:col}));
  defs.appendChild(m);
});
svg.appendChild(defs);

// 1. Phase bands
bands.forEach(b=>{
  svg.appendChild(mk('rect',{x:b.x,y:b.y,width:b.w,height:b.h,rx:'8',
    fill:b.fill,stroke:b.stroke,'stroke-width':'2'}));
  // Top stripe
  svg.appendChild(mk('rect',{x:b.x,y:b.y,width:b.w,height:'4',rx:'3',
    fill:b.stroke,opacity:'0.55'}));
  // Label — left-aligned inside band
  const t=mk('text',{x:b.x+14,y:b.y+22,'text-anchor':'start',
    'font-family':'IBM Plex Mono, monospace','font-size':'11.5',
    'font-weight':'600','letter-spacing':'0.08em',fill:b.stroke,opacity:'1'});
  t.textContent=b.lbl;
  svg.appendChild(t);
});

// 2. Edges
edges.forEach(e=>{
  const d=buildPath(e);
  if(!d)return;
  svg.appendChild(mk('path',{d,class:`edge e-${e.c}`,'marker-end':`url(#ar-${e.c})`}));
});

// 3. Nodes
const CM={
  r:{stroke:'#e03030',fill:'rgba(224,48,48,.09)',tt:'#ddd',sub:'rgba(255,120,120,.85)',bx:'bx-r',dm:'dm-r'},
  g:{stroke:'#22c55e',fill:'rgba(34,197,94,.08)', tt:'#bbb',sub:'rgba(80,230,140,.8)', bx:'bx-g',dm:'dm-g'},
};

function tipHTML(n){
  const C={r:'#ff6060',g:'#5dfc8a'},c=C[n.crit];
  const BL={r:'rgba(224,48,48,.18)',g:'rgba(34,197,94,.12)'};
  const BB={r:'rgba(224,48,48,.35)',g:'rgba(34,197,94,.3)'};
  const BD={r:'KRITISCH',g:'PARALLEL'};
  const badge=`<span style="background:${BL[n.crit]};color:${c};border:1px solid ${BB[n.crit]};border-radius:3px;padding:1px 7px;font-size:10px;margin-left:8px">${BD[n.crit]}</span>`;
  let h=`<div class="tt" style="color:${c}">ID&nbsp;${n.id} · ${n.label.join(' ')} ${badge}</div>`;
  if(n.type==='ms'){h+=tr('Typ','Meilenstein')+tr('Datum',n.date);}
  else{h+=tr('Start – Ende',n.date)+tr('Dauer',n.dur);}
  if(n.res){
    h+='<div class="tsep"></div>';
    h+=tr('Ressourcen',n.res)+tr('Aufwand',n.work);
    if(n.note)h+=tr('Hinweis',n.note);
    h+='<div class="tsep"></div>';
    h+=`<div class="tcost" style="color:${c}">${n.cost}</div>`;
  }
  return h;
}
function tr(k,v){return`<div class="trow"><span class="tk">${k}:</span><span class="tv">${v}</span></div>`;}

nodes.forEach((n,i)=>{
  const cm=CM[n.crit];
  const g=mk('g',{class:'ng',style:`animation-delay:${i*28}ms`});
  if(n.type==='ms'){
    const pts=`${n.cx},${n.cy-DHH} ${n.cx+DHW},${n.cy} ${n.cx},${n.cy+DHH} ${n.cx-DHW},${n.cy}`;
    g.appendChild(mk('polygon',{points:pts,fill:cm.fill,stroke:cm.stroke,'stroke-width':'2',class:cm.dm}));
    n.label.forEach((line,li)=>{
      const t=mk('text',{x:n.cx,y:n.cy+(li===0?-8:8),'text-anchor':'middle','dominant-baseline':'middle',
        'font-family':'IBM Plex Mono, monospace','font-size':'9.5',fill:cm.sub,'font-weight':'500'});
      t.textContent=line;g.appendChild(t);
    });
    const dt=mk('text',{x:n.cx,y:n.cy+DHH+14,'text-anchor':'middle',
      'font-family':'IBM Plex Mono, monospace','font-size':'8.5',fill:'#3a3a3a'});
    dt.textContent=n.date;g.appendChild(dt);
    const hit=mk('polygon',{points:pts,fill:'transparent',stroke:'none'});
    hit.addEventListener('mouseenter',e=>showTip(e,n));
    hit.addEventListener('mousemove',moveTip);
    hit.addEventListener('mouseleave',hideTip);
    g.appendChild(hit);
  } else {
    const rx=n.cx-NW/2,ry=n.cy-NH/2;
    g.appendChild(mk('rect',{x:rx,y:ry,width:NW,height:NH,rx:'4',ry:'4',
      fill:cm.fill,stroke:cm.stroke,'stroke-width':'1.7',class:cm.bx}));
    const bid=mk('text',{x:rx+NW-7,y:ry+11,'text-anchor':'end',
      'font-family':'IBM Plex Mono, monospace','font-size':'7.5',fill:cm.stroke,opacity:'0.4'});
    bid.textContent=`#${n.id}`;g.appendChild(bid);
    n.label.forEach((line,li)=>{
      const t=mk('text',{x:n.cx,y:n.cy-7+(li*14),'text-anchor':'middle',
        'font-family':'IBM Plex Sans, sans-serif','font-size':'10.5',fill:cm.tt,'font-weight':'600'});
      t.textContent=line;g.appendChild(t);
    });
    g.appendChild(mk('line',{x1:rx+7,y1:n.cy+13,x2:rx+NW-7,y2:n.cy+13,stroke:'#1a1a1a','stroke-width':'1'}));
    const dur=mk('text',{x:rx+8,y:n.cy+25,'font-family':'IBM Plex Mono, monospace','font-size':'8.5',fill:cm.stroke,opacity:'0.65'});
    dur.textContent=n.dur;g.appendChild(dur);
    const date=mk('text',{x:rx+NW-8,y:n.cy+25,'text-anchor':'end','font-family':'IBM Plex Mono, monospace','font-size':'8.5',fill:'#3a3a3a'});
    date.textContent=n.date;g.appendChild(date);
    const hit=mk('rect',{x:rx,y:ry,width:NW,height:NH,fill:'transparent',stroke:'none'});
    hit.addEventListener('mouseenter',e=>showTip(e,n));
    hit.addEventListener('mousemove',moveTip);
    hit.addEventListener('mouseleave',hideTip);
    g.appendChild(hit);
  }
  svg.appendChild(g);
});

function showTip(e,n){tip.innerHTML=tipHTML(n);tip.style.opacity='1';moveTip(e);}
function moveTip(e){
  const tw=tip.offsetWidth||320,th=tip.offsetHeight||180;
  let x=e.clientX+16,y=e.clientY-16;
  if(x+tw>window.innerWidth-8)x=e.clientX-tw-8;
  if(y+th>window.innerHeight-8)y=window.innerHeight-th-8;
  tip.style.left=Math.max(x,4)+'px';tip.style.top=Math.max(y,4)+'px';
}
function hideTip(){tip.style.opacity='0';}
</script>
</body>
</html>
